schema_version: 2
project: local-web-app
defaults:
  priority_order: "higher_is_more_important"
  status_field: "status"
  blocked_field: "blocked"
  blocked_reason_field: "blocked_reason"
  review_feedback_field: "review_feedback"
  requires_field: "requires"

stories:
  - id: S-001
    title: "Repo skeleton: Go module, Goa, Vue, SQLite, Docker Compose"
    priority: 90
    status: todo
    complexity: high
    requires: []
    acceptance:
      - "BE: cd backend && make build produces binary; starts on :8080; GET /health returns 200"
      - "BE: cd backend && make gen runs Goa codegen without errors"
      - "FE: cd frontend && npm ci && npm run build produces production bundle"
      - "OPS: make up starts both containers; frontend at :3000, backend at :8080/health"
      - "OPS: make up-dev starts dev stack with hot reload (air + Vite HMR)"
      - "OPS: Dockerfile.claude-sandbox installs Go toolchain, gopls, typescript-language-server"
      - "BE: make test-backend and FE: npm run test both pass with placeholder tests"
    testing:
      - "Verify make up and make up-dev work in claude-sandbox container"
      - "Verify Dockerfile.claude-sandbox builds successfully with Go + Node tooling"
    notes: |
      Foundation story. Template is already scaffolded but needs Go module init,
      Goa DSL setup, SQLite dependency, and Dockerfile.claude-sandbox creation.
      Key files: backend/go.mod, backend/Makefile, Makefile, docker-compose.yml,
      Dockerfile.claude-sandbox, .claude-sandbox.yaml

  - id: S-002
    title: "Data dir bootstrap, crypto helpers, manifest read/write"
    priority: 85
    status: todo
    complexity: medium
    requires: [S-001]
    acceptance:
      - "BE: On startup, creates $DATA_DIR/{projects,exports,tmp,nats} if missing"
      - "BE: Defaults to ~/image-dataset-tool when $DATA_DIR unset"
      - "BE: Reads encryption key from $DATA_DIR/secret.key; fails with clear error if missing"
      - "BE: Fails with clear error if secret.key permissions are not 0600"
      - "BE: AES-256-GCM encrypt/decrypt round-trip test passes with test-scoped key"
      - "BE: Write project manifest.json, read back, assert fields match docs/files.md"
      - "BE: Write sample .json, read back, assert all fields including nested captions"
      - "BE: Manifest writes use write-to-temp-then-rename (atomic) to prevent corrupt JSON"
      - "BE: SQLite created at $DATA_DIR/db.sqlite; WAL mode, FK ON, 5s busy timeout"
      - "BE: All tables from docs/database.md created via migration with ON DELETE CASCADE"
    testing:
      - "Test atomic write: simulate crash between temp write and rename"
      - "Test key permission check: create key with 0644, verify startup fails"
      - "Test sentinel decrypt on startup for wrong-key detection"

  - id: S-003
    title: "Embedded NATS JetStream: in-process server, streams, persistence"
    priority: 85
    status: todo
    complexity: medium
    requires: [S-001]
    acceptance:
      - "BE: Embedded NATS server starts in-process (no network port)"
      - "BE: JetStream enabled with file-backed storage at $DATA_DIR/nats/"
      - "BE: Stream created with subjects: media.fetch.>, media.process, media.caption, media.export, media.dlq"
      - "BE: Durable pull consumers for each subject with MaxAckPending from config"
      - "BE: AckWait configurable per consumer (default values per PRD §5.2)"
      - "BE: MaxBytes stream limit configurable (default 1GB, DiscardOld policy)"
      - "BE: Integration test: publish → consume → ACK → message removed"
      - "BE: Integration test: NAK with delay → redelivered after delay"
      - "BE: Integration test: max deliveries exceeded → routed to media.dlq"
      - "BE: NATS data survives backend restart"
    testing:
      - "Test stream persistence: stop server, restart, verify pending messages remain"
      - "Test MaxBytes limit: publish until limit, verify DiscardOld behavior"

  - id: S-004
    title: "Pipeline worker framework: consumers, retry, DLQ, rate limiting, SSE"
    priority: 80
    status: todo
    complexity: high
    requires: [S-002, S-003]
    acceptance:
      - "BE: Base consumer type: pull from NATS, invoke handler, ACK on success, NAK with backoff on error, DLQ after max
        retries"
      - "BE: Workers send msg.InProgress() for long operations to prevent AckWait redelivery"
      - "BE: Per-provider rate.Limiter: rpm=10 in config throttles to ~10 req/60s"
      - "BE: DB counter increment succeeds before ACK; if DB fails, NAK the message"
      - "BE: Job completion: completed_items + failed_items = total_items triggers succeeded status"
      - "BE: Job with NULL total_items: incremented as pages discovered; complete when counters match and pagination exhausted"
      - "BE: trace_id generated on first-mover events, propagated to all child events"
      - "BE: SSE bridge emits consumer.stats every 2s; client test verifies receipt"
      - "BE: Structured slog per message: job_id, trace_id, subject, duration_ms, attempt, status"
      - "BE: Graceful shutdown: SIGTERM stops consumers, in-flight ACK/NAK, drain within 30s"
      - "BE: Disk full (ENOSPC) NAKs with error code; N consecutive disk errors auto-pause job"
      - "BE: Stale running jobs: on startup, cross-check NATS; mark interrupted if no pending messages"
    testing:
      - "Test graceful shutdown sequence: SIGTERM during active processing"
      - "Test disk full handling with mock filesystem"
      - "Test trace_id propagation across pipeline stages"
      - "Test stale job detection on restart"

  - id: S-005
    title: "Filesystem-as-truth reconciler"
    priority: 75
    status: todo
    complexity: medium
    requires: [S-002]
    acceptance:
      - "BE: Reconciler runs on every startup, not just when DB is empty"
      - "BE: Adds DB rows for manifests on disk missing from DB"
      - "BE: Removes DB rows for entries whose manifests no longer exist"
      - "BE: Updates DB rows where manifest content differs (manifest wins)"
      - "BE: Handles malformed manifest JSON: logs warning, skips, does not delete file"
      - "BE: Idempotent: running twice produces identical DB state"
      - "BE: Captions in sample .json imported into captions table with correct study_id"
      - "BE: Reconciler completes before NATS consumers start (gated startup)"
    testing:
      - "Test with manually modified manifests: verify DB syncs"
      - "Test with corrupt JSON manifest: verify skip + warning"
      - "Test reconciler + NATS startup ordering"

